name: "Steven Baldwin"
position: "Director, ALS Instructor, Course Director, Instructor Course Instructor"
bio: "Steven works as a Clinical Nurse Consultant on the emergency response team at a major tertiary hospital, bringing strong critical care experience to his teaching. He is passionate about resuscitation education and supports clinicians to develop clear, practical skills they can rely on in high pressure situations. Outside of work, Steven enjoys family life with his wife and four young children and is actively involved in Surf Lifesaving at a club, branch and state level."
