name: "Sarah Baldwin"
position: "Director, ALS Instructor, Course Director"
bio: "Sarah holds senior clinical and educational roles in Emergency and Paediatrics and is also a Registered Midwife. She brings extensive hands on experience to her teaching, combining emergency care expertise with a passion for education and developing confident, capable responders. Away from clinical practice, Sarah enjoys family life with her husband and four young children and is a longstanding member of Rainbow Bay Surf Life Saving Club."
